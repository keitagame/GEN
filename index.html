<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>MD-emu</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
      @font-face {
  font-family: "Renner";
  src: url("./Renner.ttf") format("truetype");
  font-display: swap;
 
}
      :root { color-scheme: light dark; }
      body {
        background: rgb(0,0,0);
        font-family: "Renner";
        margin: 0; padding: 0;
      }
      h1 { font-weight: 300; font-size: 25px; }
      header {
        display: flex; gap: 12px; align-items: center; margin-bottom: 12px;
      }
      canvas {
        height: 100%;
        aspect-ratio: 320 / 224;
        image-rendering: pixelated;
        border: 1px solid #000000;
        background: #000;
      }
      .row {
        padding-top: 0px; height: 83vh;
        justify-content: center; display: flex;
        gap: 12px; align-items: center;
      }
      .mono { font-size: 20px; }
      small { opacity: 0.7; }
      button {
        font-family: sans-serif; padding: 10px;
        background: rgb(0,0,0); color: rgb(255,255,255);
        border: 1px solid rgb(255,255,255); cursor: pointer;
      }
      .file-input { display: none; }
      .file-label {
        display: inline-block; padding: 10px 16px;
        background: #000000; color: white;
        border: 1px solid white; border-radius: 0px;
        cursor: pointer; font-size: 14px; transition: background 0.2s;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Mega Drive</h1>
      <label class="file-label">
        Select
        <input id="rom" type="file" class="file-input" />
      </label>
      <span id="file-name"></span>
      <button id="fullscreenBtn">Fullscreen</button>
      <button id="start">Start</button>
      <div class="mono" id="status">No ROM</div>
      <div>
        <span class="mono">CPU PC:</span>
        <span id="pc" class="mono">0x000000</span>
      </div>
    </header>
    <div class="row">
      <canvas id="screen" width="320" height="224"></canvas>
      <div style="display:none">
        <div><b>FPS:</b> <span id="fps">0</span></div>
        <div><b>Cycles:</b> <span id="cyc" class="mono">0</span></div>
      </div>
    </div>

    <script>
    "use strict";

    function h8(v)  { return (v&0xff).toString(16).padStart(2,"0"); }
    function h16(v) { return (v&0xffff).toString(16).padStart(4,"0"); }
    function h24(v) { return (v&0xffffff).toString(16).padStart(6,"0"); }
    function h32(v) { return (v>>>0).toString(16).padStart(8,"0"); }

    // ═══════════════════════════════════════════════════════════
    // Mega Drive VDP
    // Genesis VDP: 320x224 (H40) or 256x224 (H32), 64 colors on screen
    // ═══════════════════════════════════════════════════════════
    class VDP {
      constructor() {
        this.vram  = new Uint8Array(0x10000);   // 64KB VRAM
        this.cram  = new Uint16Array(64);        // 64 colors (9-bit: BBBGGGRRRx)
        this.vsram = new Uint16Array(40);        // Vertical scroll
        this.regs  = new Uint8Array(24);

        // Control port state
        this.ctrlWord   = 0;
        this.ctrlFlag   = false;   // second word pending
        this.addrReg    = 0;
        this.codeReg    = 0;       // CD bits

        // Status register bits
        this.status = 0x3400;     // always-set bits (FIFO empty, etc.)
        this.vblankFlag  = false;
        this.hblankFlag  = false;
        this.intPending  = false;
        this.hint_counter = 0;

        this.scanline  = 0;
        this.hcyc      = 0;
        this.frameCount= 0;
        this.dmaFill   = false;
        this.dmaFillData = 0;

        // Output buffer 320x224
        this.WIDTH  = 320;
        this.HEIGHT = 224;
        this.out = new Uint32Array(this.WIDTH * this.HEIGHT);

        // DMA
        this.dmaLength  = 0;
        this.dmaSource  = 0;
        this.dmaDest    = 0;
        this.dmaMode    = 0;

        this.bus = null; // set after construction
      }

      // ── Color conversion: MD 9-bit (0BGR BBB GGG RRR) → ARGB32 ──
      _cramColor(idx) {
        const c = this.cram[idx & 63];
        // MD color: bits [8:6]=B [5:3]=G [2:0]=R, each 0-7 → 0-255
        const r = (c & 0x00E) >>> 1;
        const g = (c & 0x0E0) >>> 5;
        const b = (c & 0xE00) >>> 9;
        // Scale 0-7 to 0-255
        return 0xff000000 |
               ((b * 36) & 0xff) |
               (((g * 36) & 0xff) << 8) |
               (((r * 36) & 0xff) << 16);
      }

      // ── VRAM helpers ──
      _vramW(addr) {
        return (this.vram[(addr) & 0xffff] << 8) | this.vram[(addr+1) & 0xffff];
      }

      // ── Control port write ──
      writeCtrl(val) {
        val &= 0xffff;
        if (!this.ctrlFlag) {
          // check if it's a register write (top 2 bits = 10)
          if ((val & 0xC000) === 0x8000) {
            const r = (val >> 8) & 0x1f;
            const v = val & 0xff;
            if (r < 24) this.regs[r] = v;
            this.ctrlFlag = false;
            return;
          }
          this.ctrlWord = val;
          this.ctrlFlag = true;
        } else {
          this.ctrlFlag = false;
          const code = ((val >> 2) & 0x3C) | ((this.ctrlWord >> 14) & 0x03);
          const addr = ((val & 0x3) << 14) | (this.ctrlWord & 0x3fff);
          this.codeReg = code;
          this.addrReg = addr;

          // DMA trigger
          if (code & 0x20) {
            this._startDMA();
          }
        }
      }

      writeCtrlByte(val) {
        // 8-bit access to control port (just treat as high byte of word)
        // Some games write bytes; handle as lower byte of next word
        this.writeCtrl(val & 0xff);
      }

      // ── Data port ──
      writeData(val) {
        this.ctrlFlag = false;
        const inc = this.regs[15];
        switch (this.codeReg & 0x0F) {
          case 0x1: // VRAM write
            this.vram[this.addrReg & 0xffff] = (val >> 8) & 0xff;
            this.vram[(this.addrReg+1) & 0xffff] = val & 0xff;
            break;
          case 0x3: // CRAM write
            this.cram[this.addrReg & 63] = val & 0xEEE;
            break;
          case 0x5: // VSRAM write
            this.vsram[this.addrReg & 39] = val & 0x7ff;
            break;
        }
        if (this.dmaFill && (this.codeReg & 0x0f) === 0x1) {
          // DMA fill triggered
          this._doDMAFill(val);
        }
        this.addrReg = (this.addrReg + inc) & 0xffff;
      }

      readData() {
        this.ctrlFlag = false;
        const inc = this.regs[15];
        let val = 0;
        switch (this.codeReg & 0x0F) {
          case 0x0: // VRAM read
            val = this._vramW(this.addrReg);
            break;
          case 0x8: // CRAM read
            val = this.cram[this.addrReg & 63];
            break;
          case 0x4: // VSRAM read
            val = this.vsram[this.addrReg & 39];
            break;
        }
        this.addrReg = (this.addrReg + inc) & 0xffff;
        return val;
      }

      readStatus() {
        this.ctrlFlag = false;
        let s = this.status;
        if (this.vblankFlag) s |= 0x08;
        if (this.hblankFlag) s |= 0x04;
        s &= ~0x0200; // DMA not busy for simplicity
        return s;
      }

      // ── DMA ──
      _startDMA() {
        if (!(this.regs[1] & 0x10)) return; // DMA disabled
        const mode = (this.regs[23] >> 6) & 3;
        this.dmaLength = ((this.regs[20] << 8) | this.regs[19]) & 0xffff;
        if (this.dmaLength === 0) this.dmaLength = 0x10000;
        this.dmaSource = ((this.regs[23] & 0x7f) << 17) | (this.regs[22] << 9) | (this.regs[21] << 1);

        if (mode === 0 || mode === 1) {
          // 68K → VRAM/CRAM/VSRAM
          this._doDMAFromBus(mode);
        } else if (mode === 2) {
          // VRAM fill (triggered on next data write)
          this.dmaFill = true;
        } else if (mode === 3) {
          // VRAM copy
          this._doDMACopy();
        }
      }

      _doDMAFromBus(mode) {
        if (!this.bus) return;
        const inc = this.regs[15];
        let src = this.dmaSource & 0xffffff;
        let dst = this.addrReg;
        for (let i = 0; i < this.dmaLength; i++) {
          const val = this.bus.read16(src & 0xfffffe);
          src += 2;
          switch (this.codeReg & 0x0f) {
            case 0x1: this.vram[dst & 0xffff] = (val >> 8); this.vram[(dst+1) & 0xffff] = val & 0xff; break;
            case 0x3: this.cram[dst & 63] = val & 0xEEE; break;
            case 0x5: this.vsram[dst & 39] = val & 0x7ff; break;
          }
          dst = (dst + inc) & 0xffff;
        }
        this.addrReg = dst;
      }

      _doDMAFill(fillVal) {
        this.dmaFill = false;
        const inc = this.regs[15];
        let dst = this.addrReg;
        const hi = (fillVal >> 8) & 0xff;
        const lo = fillVal & 0xff;
        for (let i = 0; i < this.dmaLength; i++) {
          this.vram[(dst ^ 1) & 0xffff] = hi;
          dst = (dst + inc) & 0xffff;
        }
        this.addrReg = dst;
      }

      _doDMACopy() {
        const inc = this.regs[15];
        let src = this.dmaSource & 0xffff;
        let dst = this.addrReg;
        for (let i = 0; i < this.dmaLength; i++) {
          this.vram[dst & 0xffff] = this.vram[src & 0xffff];
          src++;
          dst = (dst + inc) & 0xffff;
        }
        this.addrReg = dst;
      }

      // ── Rendering ──
      _renderLine(sl) {
        if (sl >= this.HEIGHT) return;
        const base = sl * this.WIDTH;
        const r1 = this.regs[1];
        const dispOn = (r1 & 0x40) !== 0;

        if (!dispOn) {
          const bg = this._cramColor(0);
          for (let x = 0; x < this.WIDTH; x++) this.out[base + x] = bg;
          return;
        }

        // Read VDP registers
        const hcellMode = (this.regs[12] & 0x01) !== 0; // 1=H40 (320px), 0=H32 (256px)
        const W = hcellMode ? 40 : 32;
        const cellW = hcellMode ? 320 : 256;

        // Name table addresses
        const ntA    = (this.regs[2] & 0x38) << 10;  // Scroll A
        const ntWin  = (this.regs[3] & 0x3e) << 10;  // Window
        const ntB    = (this.regs[4] & 0x07) << 13;  // Scroll B
        const satBase= (this.regs[5] & 0x7e) << 9;   // Sprite Attribute Table
        const htBase = (this.regs[13] & 0x3f) << 10; // HScroll table

        // Scroll sizes
        const hScrMode = this.regs[11] & 0x03;
        const vScrMode = (this.regs[11] >> 2) & 0x01;
        const planeW_cells = [32, 64, 0, 128][this.regs[16] & 0x03];
        const planeH_cells = [32, 64, 0, 128][(this.regs[16] >> 4) & 0x03];
        const pW = planeW_cells || 32;
        const pH = planeH_cells || 32;

        // Background color (palette 0, color 0)
        const bgColor = this._cramColor(0);

        // Fill with background
        for (let x = 0; x < this.WIDTH; x++) this.out[base + x] = bgColor;

        // ── Helper: draw a plane line ──
        const drawPlane = (ntBase, hscroll, vscroll_base) => {
          for (let col = 0; col < W; col++) {
            // Per-column vertical scroll (VSRAM)
            const vscroll = vScrMode ? this.vsram[col & 39] : this.vsram[0];
            const scrolledY = (sl + (vscroll & 0x7ff)) & (pH * 8 - 1);
            const tileRow = scrolledY >> 3;
            const pixelRow = scrolledY & 7;

            const scrolledX = (col * 8 - hscroll) & (pW * 8 - 1);
            const tileCol = scrolledX >> 3;
            const pixelCol = scrolledX & 7;

            // Cell entry in name table (2 bytes)
            const ntOff = ((tileRow % pH) * pW + (tileCol % pW)) * 2;
            const cell = this._vramW((ntBase + ntOff) & 0xffff);

            const patIdx  = cell & 0x7ff;
            const hflip   = (cell >> 11) & 1;
            const vflip   = (cell >> 12) & 1;
            const palette = (cell >> 13) & 3;
            const priority= (cell >> 15) & 1;

            const pr = vflip ? 7 - pixelRow : pixelRow;
            const pc = hflip ? 7 - pixelCol : pixelCol;

            // 4bpp tile data: 4 bytes per row, each byte = 2 pixels
            const tileBase = patIdx * 32 + pr * 4;
            const byteIdx  = tileBase + (pc >> 1);
            const nibble   = (pc & 1) ? (this.vram[byteIdx & 0xffff] & 0x0f)
                                       : (this.vram[byteIdx & 0xffff] >> 4);

            if (nibble !== 0) {
              const cramIdx = palette * 16 + nibble;
              const px = col * 8 + (scrolledX & 7);
              if (px >= 0 && px < this.WIDTH)
                this.out[base + col * 8 + (pixelCol ^ (hflip ? 7 : 0))] = this._cramColor(cramIdx);
            }
          }
        };

        // ── H-scroll ──
        let hscrollA = 0, hscrollB = 0;
        if (hScrMode === 0) {
          // Full screen scroll
          hscrollA = this._vramW(htBase) & 0x3ff;
          hscrollB = this._vramW(htBase + 2) & 0x3ff;
        } else if (hScrMode === 2) {
          // Per-cell
          const cellRow = sl >> 3;
          hscrollA = this._vramW(htBase + cellRow * 4) & 0x3ff;
          hscrollB = this._vramW(htBase + cellRow * 4 + 2) & 0x3ff;
        } else if (hScrMode === 3) {
          // Per-line
          hscrollA = this._vramW(htBase + sl * 4) & 0x3ff;
          hscrollB = this._vramW(htBase + sl * 4 + 2) & 0x3ff;
        }

        // Draw planes B (low priority) then A (high priority)
        drawPlane(ntB, hscrollB, 0);
        drawPlane(ntA, hscrollA, 0);

        // ── Window plane ──
        const winH = (this.regs[17] & 0x1f) * 8;
        const winRight = (this.regs[17] & 0x80) !== 0;
        const winV = (this.regs[18] & 0x1f) * 8;
        const winDown = (this.regs[18] & 0x80) !== 0;
        const inWinV = winDown ? sl >= winV : sl < winV;
        if (winH > 0 || inWinV) {
          const winRow = sl >> 3;
          const winPixRow = sl & 7;
          for (let col = 0; col < W; col++) {
            const inWinH = winRight ? (col * 8 >= winH) : (col * 8 < winH);
            if (!inWinV && !inWinH) continue;
            const ntOff = (winRow * W + col) * 2;
            const cell = this._vramW((ntWin + ntOff) & 0xffff);
            const patIdx  = cell & 0x7ff;
            const hflip   = (cell >> 11) & 1;
            const vflip   = (cell >> 12) & 1;
            const palette = (cell >> 13) & 3;
            const pr = vflip ? 7 - winPixRow : winPixRow;
            for (let pc2 = 0; pc2 < 8; pc2++) {
              const pc = hflip ? 7 - pc2 : pc2;
              const tileBase = patIdx * 32 + pr * 4;
              const byteIdx  = tileBase + (pc >> 1);
              const nibble   = (pc & 1) ? (this.vram[byteIdx & 0xffff] & 0x0f)
                                         : (this.vram[byteIdx & 0xffff] >> 4);
              if (nibble !== 0) {
                const cramIdx = palette * 16 + nibble;
                const px = col * 8 + pc2;
                if (px >= 0 && px < this.WIDTH) this.out[base + px] = this._cramColor(cramIdx);
              }
            }
          }
        }

        // ── Sprites ──
        // Read sprite attribute table
        const maxSprites = hcellMode ? 80 : 64;
        let sprCount = 0;
        let link = 0;
        const sprOnLine = [];

        for (let s = 0; s < maxSprites; s++) {
          const sOff = satBase + link * 8;
          const yPos = (this._vramW(sOff) & 0x1ff) - 128;
          const sizeW = ((this._vramW(sOff + 2) >> 2) & 0x03) + 1;
          const sizeH = (this._vramW(sOff + 2) & 0x03) + 1;
          const sprH = sizeH * 8;
          const sprW = sizeW * 8;
          const row = sl - yPos;
          if (row >= 0 && row < sprH) {
            const xPos  = (this._vramW(sOff + 6) & 0x1ff) - 128;
            const cell2 = this._vramW(sOff + 4);
            sprOnLine.push({ xPos, yPos, sizeW, sizeH, row, cell: cell2 });
            if (++sprCount >= 20) break; // max per line
          }
          link = this._vramW(sOff + 2) & 0x7f;
          if (link === 0 || link >= maxSprites) break;
        }

        // Draw sprites (back to front)
        for (let si = sprOnLine.length - 1; si >= 0; si--) {
          const sp = sprOnLine[si];
          const patIdx  = sp.cell & 0x7ff;
          const hflip   = (sp.cell >> 11) & 1;
          const vflip   = (sp.cell >> 12) & 1;
          const palette = (sp.cell >> 13) & 3;
          const sprRow  = vflip ? (sp.sizeH * 8 - 1 - sp.row) : sp.row;
          const tileRow = sprRow >> 3;
          const pixRow  = sprRow & 7;

          for (let col2 = 0; col2 < sp.sizeW * 8; col2++) {
            const px = sp.xPos + col2;
            if (px < 0 || px >= this.WIDTH) continue;
            const tileCol2 = col2 >> 3;
            const pixCol2  = col2 & 7;
            const tc = hflip ? (sp.sizeW - 1 - tileCol2) : tileCol2;
            const pc2 = hflip ? 7 - pixCol2 : pixCol2;
            const tileIdx = patIdx + tileCol2 + tileRow * sp.sizeW;
            const tileBase2 = (tileIdx) * 32 + pixRow * 4;
            const byteIdx2  = tileBase2 + (pc2 >> 1);
            const nibble2   = (pc2 & 1) ? (this.vram[byteIdx2 & 0xffff] & 0x0f)
                                         : (this.vram[byteIdx2 & 0xffff] >> 4);
            if (nibble2 !== 0) {
              const cramIdx = palette * 16 + nibble2;
              this.out[base + px] = this._cramColor(cramIdx);
            }
          }
        }
      }

      tick(cyc) {
        // 3420 pixels per scanline at master clock (53.69MHz / 15 = ~3.58MHz pixel clock)
        // Approx: 488 68k cycles per scanline
        const CPL = 488;
        this.hcyc += cyc;
        let vint = 0;
        while (this.hcyc >= CPL) {
          this.hcyc -= CPL;
          const sl = this.scanline;
          if (sl < this.HEIGHT) {
            this._renderLine(sl);
          }
          // H-blank interrupt
          if (sl <= this.HEIGHT) {
            this.hint_counter--;
            if (this.hint_counter < 0) {
              this.hint_counter = this.regs[10];
              if (this.regs[0] & 0x10) {
                this.intPending = true; // level 4
              }
            }
          } else {
            this.hint_counter = this.regs[10];
          }
          // V-blank at scanline 224
          if (sl === this.HEIGHT) {
            this.vblankFlag = true;
            this.status |= 0x08;
            if (this.regs[1] & 0x20) {
              vint = 1;
            }
          }
          if (sl === 261) {
            this.vblankFlag = false;
            this.status &= ~0x08;
            this.frameCount++;
          }
          this.scanline = (this.scanline + 1) % 262;
        }
        return vint;
      }

      flush(imgData) {
        const d = imgData.data;
        for (let i = 0; i < this.WIDTH * this.HEIGHT; i++) {
          const c = this.out[i];
          const p = i * 4;
          d[p]   = (c >> 16) & 0xff;
          d[p+1] = (c >> 8)  & 0xff;
          d[p+2] =  c        & 0xff;
          d[p+3] = 0xff;
        }
      }
    }

    // ═══════════════════════════════════════════════════════════
    // YM2612 stub (FM sound – simplified register write only)
    // ═══════════════════════════════════════════════════════════
    class YM2612 {
      constructor() {
        this.regs = new Uint8Array(0x200);
        this.addrPort0 = 0;
        this.addrPort1 = 0;
      }
      writeAddr0(v) { this.addrPort0 = v; }
      writeData0(v) { this.regs[this.addrPort0] = v; }
      writeAddr1(v) { this.addrPort1 = v; }
      writeData1(v) { this.regs[0x100 | this.addrPort1] = v; }
      read() { return 0x00; } // not busy
    }

    // ═══════════════════════════════════════════════════════════
    // SN76489 PSG stub
    // ═══════════════════════════════════════════════════════════
    class PSG {
      constructor() { this.latch = 0; }
      write(v) { /* stub */ }
    }

    // ═══════════════════════════════════════════════════════════
    // Z80 sub-CPU (sound CPU) – minimal stub
    // ═══════════════════════════════════════════════════════════
    class Z80Sub {
      constructor() {
        this.ram    = new Uint8Array(0x2000);
        this.rom    = null;
        this.pc     = 0;
        this.sp     = 0xffff;
        this.a = 0; this.f = 0;
        this.b = 0; this.c = 0;
        this.d = 0; this.e = 0;
        this.h = 0; this.l = 0;
        this.halted = true;
        this.reset_pending = true;
        this.bus_req = false;
        this.cyc = 0;
      }
      reset()  { this.pc = 0; this.halted = false; this.reset_pending = false; }
      requestBus(v) { this.bus_req = v; }
      step()   { /* minimal: just burn cycles */ this.cyc += 4; }
    }

    // ═══════════════════════════════════════════════════════════
    // Joypad (6-button MD controller)
    // ═══════════════════════════════════════════════════════════
    const BTN_UP=0, BTN_DOWN=1, BTN_LEFT=2, BTN_RIGHT=3;
    const BTN_A=4, BTN_B=5, BTN_C=6, BTN_START=7;
    const BTN_X=8, BTN_Y=9, BTN_Z=10, BTN_MODE=11;

    class Joypad {
      constructor() {
        this.buttons = 0xfff; // all released (active low)
        this.ctrl = 0x40;     // TH high = normal, TH low = extra
        this.thState = 1;
        this.counter = 0;
      }
      press(b)   { this.buttons &= ~(1 << b); }
      release(b) { this.buttons |=  (1 << b); }

      read() {
        // TH controls which data is output
        if (this.thState) {
          // TH=1: Up Down Left Right B C
          return 0x40 | ((this.buttons >> 0) & 0x0f) |
                        (((this.buttons >> 5) & 1) << 4) |   // B
                        (((this.buttons >> 6) & 1) << 5);    // C
        } else {
          // TH=0: Up Down 0 0 A Start
          return 0x00 | ((this.buttons >> 0) & 0x03) |
                        (((this.buttons >> 4) & 1) << 4) |   // A
                        (((this.buttons >> 7) & 1) << 5);    // Start
        }
      }

      write(val) {
        this.thState = (val >> 6) & 1;
      }
    }

    // ═══════════════════════════════════════════════════════════
    // Mega Drive Bus / Memory Map
    // 0x000000-0x3FFFFF  ROM (up to 4MB)
    // 0xA00000-0xA0FFFF  Z80 RAM / sound
    // 0xA10000-0xA1001F  I/O (controllers)
    // 0xA11000-0xA11200  Z80 bus/reset
    // 0xC00000-0xC0001F  VDP (even/odd addresses)
    // 0xE00000-0xFFFFFF  68K RAM (64KB, mirrored)
    // ═══════════════════════════════════════════════════════════
    class Bus {
      constructor(rom, vdp, ym2612, psg, joy1, joy2, z80) {
        this.rom    = rom;
        this.vdp    = vdp;
        this.ym2612 = ym2612;
        this.psg    = psg;
        this.joy1   = joy1;
        this.joy2   = joy2;
        this.z80    = z80;
        this.ram    = new Uint8Array(0x10000);  // 64KB work RAM

        // I/O control registers
        this.ioctrl = new Uint8Array(0x20);
        this.iodata = new Uint8Array(0x20);
        this.ioctrl[0] = 0x00; // controller 1 data
        this.ioctrl[1] = 0x00; // controller 2 data

        vdp.bus = this;
      }

      read16(addr) {
        addr &= 0xfffffe; // word-align
        const hi = this.read8(addr);
        const lo = this.read8(addr + 1);
        return (hi << 8) | lo;
      }

      write16(addr, val) {
        addr &= 0xfffffe;
        this.write8(addr,   (val >> 8) & 0xff);
        this.write8(addr+1,  val & 0xff);
      }

      read8(addr) {
        addr &= 0xffffff;

        // ROM
        if (addr < 0x400000) {
          return addr < this.rom.length ? this.rom[addr] : 0xff;
        }
        // Z80 RAM window (A00000-A0FFFF)
        if (addr >= 0xa00000 && addr <= 0xa0ffff) {
          if (addr < 0xa02000) return this.z80.ram[addr & 0x1fff];
          return 0xff;
        }
        // I/O
        if (addr >= 0xa10000 && addr <= 0xa1001f) {
          return this._readIO(addr & 0x1f);
        }
        // Z80 bus/reset
        if (addr >= 0xa11000 && addr <= 0xa11fff) {
          if (addr === 0xa11100 || addr === 0xa11101) return this.z80.bus_req ? 0x01 : 0x00;
          return 0xff;
        }
        // TMSS register
        if (addr === 0xa14000 || addr === 0xa14001) return 0xff;
        // VDP
        if (addr >= 0xc00000 && addr <= 0xc0001f) {
          return this._readVDP(addr);
        }
        // 68K RAM (E00000-FFFFFF)
        if (addr >= 0xe00000) {
          return this.ram[addr & 0xffff];
        }
        return 0xff;
      }

      write8(addr, val) {
        addr &= 0xffffff; val &= 0xff;
        if (addr >= 0x400000 && addr < 0xa00000) return; // open bus
        if (addr >= 0xa00000 && addr <= 0xa0ffff) {
          if (addr < 0xa02000) this.z80.ram[addr & 0x1fff] = val;
          return;
        }
        if (addr >= 0xa10000 && addr <= 0xa1001f) { this._writeIO(addr & 0x1f, val); return; }
        if (addr >= 0xa11000 && addr <= 0xa11fff) {
          if (addr === 0xa11100) { this.z80.requestBus(val & 1); return; }
          if (addr === 0xa11200) { if (!(val & 1)) this.z80.reset(); return; }
          return;
        }
        if (addr === 0xa14000) return; // TMSS
        if (addr >= 0xc00000 && addr <= 0xc0001f) { this._writeVDP(addr, val); return; }
        if (addr >= 0xe00000) { this.ram[addr & 0xffff] = val; return; }
      }

      _readVDP(addr) {
        const a = addr & 0x1f;
        if (a <= 0x03) {
          // Data port
          if ((a & 1) === 0) return (this.vdp.readData() >> 8) & 0xff;
          return this.vdp.readData() & 0xff;
        }
        if (a >= 0x04 && a <= 0x07) {
          const s = this.vdp.readStatus();
          if ((a & 1) === 0) return (s >> 8) & 0xff;
          return s & 0xff;
        }
        if (a === 0x08 || a === 0x09) return 0; // H counter
        if (a === 0x0a || a === 0x0b) return 0; // V counter
        return 0xff;
      }

      _writeVDP(addr, val) {
        const a = addr & 0x1f;
        if (a === 0x11 || a === 0x13 || a === 0x15 || a === 0x17) {
          this.psg.write(val); return;
        }
        // VDP data port (C00000-C00003)
        if (a <= 0x03) {
          if (a <= 0x01) {
            // write16 to data
            if (a === 0) this._pendingDataHi = val;
            else this.vdp.writeData((this._pendingDataHi << 8) | val);
          } else {
            // control port
            if (a === 2) this._pendingCtrlHi = val;
            else this.vdp.writeCtrl((this._pendingCtrlHi << 8) | val);
          }
          return;
        }
        // 16-bit control writes via byte addresses
        if (a >= 0x04 && a <= 0x07) {
          if (a === 4) this._pendingCtrlHi = val;
          else if (a === 5) this.vdp.writeCtrl((this._pendingCtrlHi << 8) | val);
        }
        // YM2612
        if (a >= 0x10 && a <= 0x17) {
          const sub = a & 0x07;
          if (sub === 0) this.ym2612.writeAddr0(val);
          else if (sub === 1) this.ym2612.writeData0(val);
          else if (sub === 2) this.ym2612.writeAddr1(val);
          else if (sub === 3) this.ym2612.writeData1(val);
        }
      }

      _readIO(a) {
        // a = offset 0x00-0x1F within A10000
        if (a === 0x01) return 0xa0;     // version register (domestic NTSC MD)
        if (a === 0x03) return this.joy1.read();
        if (a === 0x05) return this.joy2.read();
        if (a === 0x07) return 0xff;     // expansion port
        return 0xff;
      }

      _writeIO(a, val) {
        if (a === 0x03) { this.joy1.write(val); return; }
        if (a === 0x05) { this.joy2.write(val); return; }
        // direction registers etc: ignore
      }
    }

_ww(a, v) {

        if (size === 0) return this._rb(addr);
        if (size === 1) return this._rw(addr);
        return this._rl(addr) >>> 0;

        else this._wl(addr, val);

  this._wl(this.a[7], this.pc);

  this.a[7] = (this.a[7] - 2) & 0xffffff;
  this._ww(this.a[7], oldSR);

  this.cyc += 44;

else if (optype === 1) res = (dst & immv) >>> 0;   // ANDI
else if (optype === 2) res = (dst - immv) >>> 0;   // SUBI
else if (optype === 3) res = (dst + immv) >>> 0;   // ADDI

      // ── Group E: Shift/Rotate ──
      _groupE(op) {
        const mode = (op >> 3) & 7;
        const reg  = op & 7;
        const sz   = (op >> 6) & 3;
        const dn   = (op >> 9) & 7;
        const dir  = (op >> 8) & 1; // 1=left, 0=right
        const isReg= (op & 0x20) !== 0;
        const type = (op >> 3) & 3;

        let cnt, val, res;

        if (sz === 3) {
          // Memory shift (1 bit)
          const addr = this._ea_addr(mode, reg, 1);
          if (addr === null) { this.cyc += 8; return; }
          val = this._rw(addr);
          cnt = 1;
          // use type from bits 9-8
          const t2 = (op >> 9) & 3;
          res = this._doShift(val, 1, dir, t2, 1);
          this._ww(addr, res);
          this.cyc += 8; return;
        }

        cnt = isReg ? (this.d[dn] & 63) : (dn || 8);
        val = sz===0?(this.d[reg]&0xff):sz===1?(this.d[reg]&0xffff):(this.d[reg]>>>0);
        const t2 = (op >> 3) & 3;
        res = this._doShift(val, cnt, dir, t2, sz);
        this._ea_write(0, reg, sz, res);
        this.cyc += 6 + cnt * 2;
      }

      _doShift(val, cnt, dir, type, sz) {
        const bits = sz === 0 ? 8 : sz === 1 ? 16 : 32;
        const msb  = 1 << (bits - 1);
        const mask = (bits === 32) ? 0xffffffff : (1 << bits) - 1;
        let res = val, C = 0, V = 0;
        for (let i = 0; i < cnt; i++) {
          switch (type) {
            case 0: // ASd
              if (dir) { C=(res>>>(bits-1))&1; res=((res<<1)|0)>>>0; }
              else { C=res&1; const sign=res&msb; res=((res>>>1)|sign)>>>0; }
              break;
            case 1: // LSd
              if (dir) { C=(res>>>(bits-1))&1; res=(res<<1)>>>0; }
              else { C=res&1; res=(res>>>1)>>>0; }
              break;
            case 2: // ROXd
              if (dir) { const old=this.flagX; C=(res>>>(bits-1))&1; res=((res<<1)|old)>>>0; }
              else { const old=this.flagX; C=res&1; res=((res>>>1)|(old<<(bits-1)))>>>0; }
              break;
            case 3: // ROd
              if (dir) { C=(res>>>(bits-1))&1; res=((res<<1)|C)>>>0; }
              else { C=res&1; res=((res>>>1)|(C<<(bits-1)))>>>0; }
              break;
          }
        }
        res &= mask;
        const N = (res & msb) ? 1 : 0;
        const Z = res === 0 ? 1 : 0;
        this._setCC(C, N, Z, V, C);
        return res;
      }
    }

    // ═══════════════════════════════════════════════════════════
    // MAIN
    // ═══════════════════════════════════════════════════════════
    const canvas   = document.getElementById("screen");
    const ctx2d    = canvas.getContext("2d");
    const imgData  = ctx2d.createImageData(320, 224);
    const pcEl     = document.getElementById("pc");
    const statusEl = document.getElementById("status");
    const fpsEl    = document.getElementById("fps");
    const fileEl   = document.getElementById("file-name");

    let cpu, bus, vdp, ym2612, psg, joy1, joy2, z80;
    let running = false, rafId = null;

    // ── Keyboard mapping (MD 3+3 button) ──
    const KM = {
      ArrowUp:    BTN_UP,    ArrowDown: BTN_DOWN,
      ArrowLeft:  BTN_LEFT,  ArrowRight: BTN_RIGHT,
      z: BTN_A,   Z: BTN_A,
      x: BTN_B,   X: BTN_B,
      c: BTN_C,   C: BTN_C,
      Enter: BTN_START,
      a: BTN_X,   A: BTN_X,
      s: BTN_Y,   S: BTN_Y,
      d: BTN_Z,   D: BTN_Z,
    };

    window.addEventListener("keydown", e => {
      if (!joy1) return;
      const b = KM[e.key];
      if (b !== undefined) { joy1.press(b); e.preventDefault(); }
    });
    window.addEventListener("keyup", e => {
      if (!joy1) return;
      const b = KM[e.key];
      if (b !== undefined) joy1.release(b);
    });

    // ── ROM loading ──
    document.getElementById("rom").addEventListener("change", e => {
      const file = e.target.files[0];
      if (!file) return;
      fileEl.textContent = file.name;
      statusEl.textContent = "Loading...";
      running = false;
      if (rafId) { cancelAnimationFrame(rafId); rafId = null; }

      const reader = new FileReader();
      reader.onload = () => {
        const rom = new Uint8Array(reader.result);
        vdp    = new VDP();
        ym2612 = new YM2612();
        psg    = new PSG();
        joy1   = new Joypad();
        joy2   = new Joypad();
        z80    = new Z80Sub();
        bus    = new Bus(rom, vdp, ym2612, psg, joy1, joy2, z80);
        cpu    = new M68K(bus);
        cpu.reset();
        document.getElementById("start").textContent = "Start";
        statusEl.textContent = "ROM Loaded – Press Start";
      };
      reader.readAsArrayBuffer(file);
    });

    // ── Start/Pause ──
    document.getElementById("start").addEventListener("click", () => {
      if (!bus) { alert("Please load a ROM first."); return; }
      if (running) {
        running = false;
        if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
        statusEl.textContent = "Paused";
        document.getElementById("start").textContent = "Start";
      } else {
        running = true;
        statusEl.textContent = "Running";
        document.getElementById("start").textContent = "Pause";
        loop();
      }
    });

    // ── Fullscreen ──
    document.getElementById("fullscreenBtn").addEventListener("click", () => {
      if (!document.fullscreenElement) canvas.requestFullscreen();
      else document.exitFullscreen();
    });

    // MD: 7.67MHz 68K, 60fps → ~127795 cycles/frame
    const CYCLES_PER_FRAME = 127795;
    let fpsFrames = 0, fpsAcc = 0, lastTs = 0;

    function loop() {
      function frame(ts) {
        if (!running) return;
        rafId = requestAnimationFrame(frame);

        const dt = ts - lastTs;
        lastTs = ts;
        fpsAcc += dt;
        fpsFrames++;
        if (fpsAcc >= 1000) {
          fpsEl.textContent = fpsFrames;
          fpsFrames = 0; fpsAcc -= 1000;
        }

        const target = cpu.cyc + CYCLES_PER_FRAME;
        try {
          while (cpu.cyc < target) {
            const before = cpu.cyc;
            cpu.step();
            
            const elapsed = Math.max(1, (cpu.cyc - before) & 0x7fffffff);
            const vf = vdp.tick(elapsed);
            if (vf) {
              cpu.irq(6); // VBlank = IRQ level 6
            }
            if (vdp.intPending) {
              vdp.intPending = false;
              cpu.irq(4); // HBlank = IRQ level 4
            }
          }
        } catch (err) {
          running = false;
          statusEl.textContent = "Error: " + err.message;
          document.getElementById("start").textContent = "Start";
          console.error(err);
          return;
        }

        vdp.flush(imgData);
        ctx2d.putImageData(imgData, 0, 0);
        pcEl.textContent = "0x" + h24(cpu.pc);
      }
      lastTs = performance.now();
      rafId = requestAnimationFrame(frame);
    }
    </script>
  </body>
</html>
